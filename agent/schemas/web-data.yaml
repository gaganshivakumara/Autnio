openapi: "3.0.0"
info:
  title: web-data
  version: "1.0"
  description: Web scraping and research via Apify
paths:
  /apify-run:
    post:
      summary: Run any Apify actor with custom input
      operationId: apifyRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId]
              properties:
                actorId:
                  type: string
                  description: "Apify actor ID (e.g. apify/web-scraper)"
                input:
                  type: string
                  description: JSON-encoded input object for the actor
                waitSecs:
                  type: string
                  description: Max seconds to wait for actor to finish (default 60)
      responses:
        "200":
          description: Actor run completed and results returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /apify-jobs:
    post:
      summary: Search job boards and return structured listings
      operationId: apifyJobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keywords]
              properties:
                keywords:
                  type: string
                  description: "Job search keywords (e.g. \"software engineer Python\")"
                location:
                  type: string
                  description: Job location filter (e.g. "San Francisco, CA")
                limit:
                  type: string
                  description: Max listings to return (default 20)
                remote:
                  type: string
                  description: Filter for remote-only jobs ("true" or "false")
      responses:
        "200":
          description: Job listings returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /product-discovery:
    post:
      summary: Discover an Amazon product — search Amazon, scrape the first result's price, rating and recent reviews
      operationId: productDiscovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: "Short Amazon search description, MAX 5 WORDS (e.g. \"blue american tourister laptop bag\"). May come from speech or from a vision identification of a camera frame. Only the first search result is scraped."
                maxReviews:
                  type: string
                  description: "Max recent review snippets to include (default 3, capped at 5). Only reviews from the last 6 months are used."
      responses:
        "200":
          description: Discovery summary returned, including a spoken-format narration in `result`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /apify-research:
    post:
      summary: Run Google search or direct web scrape for research
      operationId: apifyResearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: Search query string or URL to scrape
                type:
                  type: string
                  description: "\"search\" for Google results, \"web\" for direct page scrape"
                  enum: [search, web]
                  default: search
                maxResults:
                  type: string
                  description: Max results to return (default 10)
      responses:
        "200":
          description: Research results returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        result:
          type: string
        data:
          type: object
