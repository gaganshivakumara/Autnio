<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../ui_kits/landing/atmosphere.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--font-sans);font-weight:400;font-size:.95rem;padding:.85rem 1.6rem;border-radius:999px;border:1px solid transparent;cursor:pointer;}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
</style></head><body><div class="row">
<button class="btn" style="background:var(--green-moss);color:#fff;box-shadow:var(--shadow-pill)">Request access</button>
<button class="btn" style="background:var(--glass-light);color:var(--ink-1);border-color:var(--glass-stroke);backdrop-filter:blur(14px)">Watch the film</button>
<button class="btn" style="background:transparent;color:var(--ink-2);opacity:.85">Learn more →</button>
</div>
<div class="cap" style="margin-top:14px">primary (solid moss · no gradients) · ghost (glass) · text · soft hover lift, gentle press</div></body></html>
