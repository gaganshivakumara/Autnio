<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.sw{display:flex;flex-direction:column;gap:8px;}
.chip{width:128px;height:64px;border-radius:14px;border:1px solid var(--glass-stroke);}
.cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--ink-2);}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
.stage{position:relative;height:120px;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#cfe2ee,#eef5ec);flex:1;}
.g{position:absolute;left:50%;bottom:-30%;width:90%;height:120%;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 100%,rgba(143,191,143,.6),rgba(143,191,143,0) 70%);}</style></head><body><div class="row" style="flex-wrap:nowrap">
<div class="stage"><div class="g"></div></div>
<div class="sw" style="width:200px"><div class="cap" style="font-size:13px;color:var(--ink-1)">Sage ground glow</div><div class="hex">rgba(143,191,143,0.18 → 0.42)</div><div class="cap" style="margin-top:6px">Replaces the reference's blue cube fade. Soft, organic, never neon.</div></div>
</div></body></html>
