<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.sw{display:flex;flex-direction:column;gap:8px;}
.chip{width:128px;height:64px;border-radius:14px;border:1px solid var(--glass-stroke);}
.cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--ink-2);}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:#1B241D"></div><div class="cap" style="color:var(--ink-1)">Ink 1</div><div class="hex">#1B241D</div></div><div class="sw"><div class="chip" style="background:#49544C"></div><div class="cap" style="color:var(--ink-1)">Ink 2</div><div class="hex">#49544C</div></div><div class="sw"><div class="chip" style="background:#7E8980"></div><div class="cap" style="color:var(--ink-1)">Ink 3</div><div class="hex">#7E8980</div></div><div class="sw"><div class="chip" style="background:#AAB4AC"></div><div class="cap" style="color:var(--ink-1)">Ink 4</div><div class="hex">#AAB4AC</div></div>
<div class="sw"><div class="chip" style="background:linear-gradient(120deg,#7aa874,#cfe2ee);display:grid;place-items:center"><span style="color:#fff;font-weight:300;font-size:13px">White&nbsp;85/65/40%</span></div><div class="cap">Text on hero</div></div>
</div></body></html>
