<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../ui_kits/landing/atmosphere.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--font-sans);font-weight:400;font-size:.95rem;padding:.85rem 1.6rem;border-radius:999px;border:1px solid transparent;cursor:pointer;}
.cap{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
.svgmark ellipse{stroke-width:2.1}</style></head><body><div class="row" style="gap:36px">
<svg width="60" height="60" viewBox="0 0 40 40" fill="none"><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(-32 20 20)" stroke="var(--ink-1)" stroke-width="2.1"/><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(32 20 20)" stroke="var(--ink-1)" stroke-width="2.1"/></svg>
<div style="display:flex;align-items:center;gap:.6rem"><svg width="30" height="30" viewBox="0 0 40 40" fill="none"><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(-32 20 20)" stroke="var(--ink-1)" stroke-width="2.1"/><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(32 20 20)" stroke="var(--ink-1)" stroke-width="2.1"/></svg><span class="wordmark" style="font-size:1.7rem">halo</span></div>
<div style="background:var(--green-moss);padding:14px 18px;border-radius:16px;display:flex;align-items:center;gap:.6rem"><svg width="26" height="26" viewBox="0 0 40 40" fill="none"><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(-32 20 20)" stroke="#fff" stroke-width="2.1"/><ellipse cx="20" cy="20" rx="9.5" ry="16" transform="rotate(32 20 20)" stroke="#fff" stroke-width="2.1"/></svg><span class="wordmark" style="font-size:1.4rem;color:#fff">halo</span></div>
</div>
<div class="cap" style="margin-top:16px">Interlinked halo rings — mirrors the hero. On light · with wordmark · reversed</div></body></html>
