<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.sw{display:flex;flex-direction:column;gap:8px;}
.chip{width:128px;height:64px;border-radius:14px;border:1px solid var(--glass-stroke);}
.cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--ink-2);}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
.b{display:flex;flex-direction:column;align-items:center;gap:8px}.box{width:96px;height:64px;background:var(--green-fog);border:1px solid var(--green-emerald)}</style></head><body><div class="row">
<div class="b"><div class="box" style="border-radius:999px"></div><div class="cap" style="color:var(--ink-1)">--r-pill</div><div class="hex">999px</div></div><div class="b"><div class="box" style="border-radius:28px"></div><div class="cap" style="color:var(--ink-1)">--r-lg</div><div class="hex">28px</div></div><div class="b"><div class="box" style="border-radius:18px"></div><div class="cap" style="color:var(--ink-1)">--r-md</div><div class="hex">18px</div></div><div class="b"><div class="box" style="border-radius:12px"></div><div class="cap" style="color:var(--ink-1)">--r-sm</div><div class="hex">12px</div></div>
</div></body></html>
