<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face{font-family:"Moue";src:url("../fonts/moue.otf") format("opentype");}
*{box-sizing:border-box;margin:0;}
body{font-family:var(--font-sans);background:var(--haze);color:var(--ink-1);padding:22px;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.sw{display:flex;flex-direction:column;gap:8px;}
.chip{width:128px;height:64px;border-radius:14px;border:1px solid var(--glass-stroke);}
.cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--ink-2);}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);}
.b{display:flex;flex-direction:column;align-items:center;gap:10px}.box{width:130px;height:70px;background:var(--cloud);border-radius:18px}</style></head><body><div class="row" style="padding:6px 0 14px">
<div class="b"><div class="box" style="box-shadow:0 24px 60px -24px rgba(79,107,76,.35)"></div><div class="cap" style="color:var(--ink-1)">float</div></div>
<div class="b"><div class="box" style="box-shadow:0 16px 40px -20px rgba(27,36,29,.18)"></div><div class="cap" style="color:var(--ink-1)">card</div></div>
<div class="b"><div class="box" style="box-shadow:0 8px 24px -10px rgba(27,36,29,.2)"></div><div class="cap" style="color:var(--ink-1)">pill</div></div>
<div class="b"><div class="box" style="box-shadow:0 0 60px 0 rgba(143,191,143,.5)"></div><div class="cap" style="color:var(--ink-1)">green glow</div></div>
</div></body></html>
