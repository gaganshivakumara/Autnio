<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>halo — an intelligent atmosphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@300..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="atmosphere.css" />
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: var(--haze); color: var(--ink-1); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    a { -webkit-tap-highlight-color: transparent; }
    @media (max-width: 760px) {
      .nav-links { display: none !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- moue.otf is referenced from colors_and_type.css with a path relative to the project root;
       fix the @font-face url for this nested page -->
  <style>
    @font-face { font-family: "Moue"; src: url("../../fonts/moue.otf") format("opentype"); font-weight: 400 700; font-display: swap; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel">
    function App() {
      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
      return (
        <React.Fragment>
          <Hero />
          <Capabilities />
          <Statement />
          <Footer />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
